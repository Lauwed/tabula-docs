name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "examples/ecommerce/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Assemble demo site
        run: |
          mkdir -p _site
          cp src/index.html _site/
          cp src/script.js _site/
          cp src/styles.css _site/
          cp src/constants.js _site/
          cp src/endpoints.js _site/
          cp src/inputs.js _site/
          cp examples/ecommerce/api.json _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
